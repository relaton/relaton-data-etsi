  content: "This European Telecommunication Standard (ETS) contains an electronic\r\ncopy
    of the ANSI-C code for the GSM half rate codec. The ANSI-C code i\r\ns necessary
    for a bit exact implementation of the half rate speech tra\r\nnscoder (GSM 06.20
    (ETS 300 969) [2]), Voice Activity Detector (GSM 06\r\n.42 (ETS 300 973) [6]),
    comfort noise (GSM 06.22 (ETS 300 971) [4]), D\r\niscontinuous Transmission (GSM
    06.41 (ETS 300 972) [5]) and example so\r\nlutions for substituting and muting
    of lost frames (GSM 06.21 (ETS 300\r\n970) [3])\r\n "

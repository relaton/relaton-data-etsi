  content: This Work Item will specify the end to end F5G Advanced network architecture,
    its  features, interfaces, and related network elements’ requirements for F5G
    Advanced release 4. The work item includes On-premise, Access, Aggregation, and
    Transmission Networks and its collaboration with computing functionality. This
    work item will define new features and enhance features from previous releases.

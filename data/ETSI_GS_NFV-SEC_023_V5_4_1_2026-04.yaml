abstract:
- content: "This work item will specify the security and hardening requirement for
    running NFV software (e.g. VNFs) in containerised environments. \r\nThis work
    item will produce a new specification covering as a minimum; Threat Analysis;
    State of the art; Isolation (namespaces); Attack surface reduction and privilege
    limitation; Security model and properties; Resource limitations (cgroups); Hardware
    protections (HMEE); Container hardening (inc patching); Containers in VMs and
    containers on bare metal. \r\nThe work will consider alignment with existing IFA
    specifications and reports (e.g. IFA 029).\r\n"

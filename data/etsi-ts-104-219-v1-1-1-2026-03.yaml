abstract:
- language: en
  script: Latn
  content: The proposed work item will provide specific usable guidance differentiated
    by available resources for three parties in the software ecosystem toward implementing
    evaluable, effective software security.  For end user customers, it will specify
    what to ask for and what steps to take.  For software development organizations,
    it will specify what to do.  For governmental or industry bodies, it will define
    the specifics to demonstrate that secure by design practices have been followed.

  content: "This GTS gives the stage 2 description of the call identification supp\r\nlementary
    services.\r\nThe group line identification supplementary services are divided
    into\r\nthe following four supplementary services:\r\n-\tCalling line identification
    presentation\tCLIP\t(clause 1);\r\n-\tCalling line identification restriction\tCLIR\t(clause
    2);\r\n-\tConnected line identification presentation\tCOLP\t(clause 3);\r\n-\tConnected
    line identification restriction\tCOLR\t(clause 4).\r\n "

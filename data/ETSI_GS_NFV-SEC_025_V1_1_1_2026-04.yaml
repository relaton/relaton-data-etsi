abstract:
- content: "This work item will focus on the capabilities to enable secure E2E management
    of VNF and NS.  \r\nIt includes:\r\n \r\n- Detail security requirements and capabilities
    that are candidates for the enhancement of the NSD and VNFD.\r\n\r\n- Definition
    of the attestation for the entire NFV system (including the multi-tenant case)
    and the VNF use of attestation to assess the security level and capability of
    the NFVI platform and NFV-MANO.\r\n\r\n- Mobility and scalability of  VNFs pinned
    by hardware (e.g. HMEE, HSM).\r\n\r\n- The secure configuration of VNFs (e.g.
    key pair injection)\r\n\r\n- Memory allocation for sensitive VNFs (e.g. avoiding
    predictable memory location). \r\n\r\n- Both VM and OS container architecture
    will be considered.\r\n\r\nThis WI will take into account the output of the GR
    NFV-EVE018 WI concerning the multi-tenancy. The WI will refer to GS NFV-SEC021
    for the security added for VNF package on-boarding. The work item is expected
    to provide detailed capabilities required by GS NFV-SEC 024.\r\n"

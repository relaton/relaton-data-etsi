abstract:
- content: 'The work item will: (i) Identify security and privacy requirements for
    the identified 6G ISAC use cases (ii) Define new security and privacy metrics
    and approaches for different cases of ISAC (joint, sensing-aided communications,
    communication-aided sensing) and different sensing types. Define Trustworthiness
    metrics of sensing data (iii) Study candidate ISAC transmission and protocols
    from the perspective of identified security and privacy metrics (iv) Investigate
    techniques to assess trustworthiness of sensing results (v) Study the impact of
    ISAC deployment on sustainability goals, (vi) Study potential regulatory aspects
    related to privacy and security.'

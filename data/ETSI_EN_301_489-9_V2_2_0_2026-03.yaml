abstract:
- content: "Revision of EN 301 489-9 to make the following changes and additions:
    \ \r\n• Add clarification in the scope to state that in order to prevent double
    testing, cochlear implants that are compliant with the EMC requirements of the
    Medical Device Directive are deemed compliant with the requirements of EN 301
    489-9 \r\n• Remove text required for this standard to be cited in OJEU.  \r\n•
    Review all references and change where justified.  \r\n• Review requirements and
    update to latest status and amended scope    \r\n• Accommodate comments received
    for EN 301 489 series from HAS consultants, EC and NSOs, e.g. Investigate the
    removal of references to clauses in basic standards that contain tolerances by
    adding necessary information into this standard without quoting tolerances or
    suitable justification."

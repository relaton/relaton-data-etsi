abstract:
- content: "The goal of this WI is to specify AdES signatures for CBOR data format
    (CB-AdES hereinafter), built on COSE signatures. More specifically this WI shall
    specify:\r\n\r\n •\tA set of CBOR objects offering similar semantics and header
    parameters as those offered by JAdES signatures.\r\n\r\n•\tThe mechanisms for
    incorporating the aforementioned header parameters as signed / unsigned objects
    within the CB-AdES digital signatures.\r\n\r\n•\tCB-AdES signatures baseline profiles,
    offering similar features as those ones offered by JAdES baseline signatures"

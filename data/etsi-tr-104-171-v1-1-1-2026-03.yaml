  script: Latn
  content: 'The TR will provide a comprehensive guide to the practical implementation
    aspects of quantum random number generators, targeted at both the implementer
    and user of such devices. This will include identifying guidance on entropy sources,
    testing, performance, and guidance on the balancing of design tradeoffs with assurance
    of QRNG security. '

abstract:
- content: "The document ETSI TS 119 432 is to be modified in order to\r\n- align
    with CSC API v2 \r\n- support remote signature creation functionalities to be
    invoked by the EUDIW\r\n\r\nThe document will specify the components semantics
    referring to other existing standards for protocols specifications, where possible,
    specifically to CSC API for JSON protocol and OASIS DSS-X for xml protocol. The
    components are to support the following functionality:\r\nAdES signatures creation
    (in asynchronous mode too)\r\nDigital signature values creation (in asynchronous
    mode too)\r\nMultiple digital signature values creation across multiple signature
    operations occurring within a single signing session\r\nAdES signatures creation
    on-the-fly (with signing certificate created on-the-fly)\r\nSigning certificates
    listing\r\nCredential information retrieval\r\nService information\r\n"

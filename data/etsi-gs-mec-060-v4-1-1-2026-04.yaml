abstract:
- language: en
  script: Latn
  content: This work item specifies the security related interaction between the API
    Gateway and Client Applications. This includes obtaining authorization to access
    the services (via the client-facing interfaces) provided by the MEC Applications,
    revoking this authorization upon certain conditions (e.g. overflow/DOS). This
    work item specifies, if supported, the interactions between the API Gateway and
    MEC management for obtaining security-related configuration (if any) for MEC Applications.

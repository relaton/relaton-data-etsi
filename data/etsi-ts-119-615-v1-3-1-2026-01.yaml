abstract:
- language: en
  script: Latn
  content: The scope of the work is to specify procedures for determining, using TS
    119 612 v2.3.1 trusted lists, whether a token issued by one of the new trust services
    introduced in the revision to Regulation (EU) 910/2014 is confirmed by the applicable
    EU MS trusted list to have been an EU qualified trust token at its generation
    time, generated by a qualified trust service.

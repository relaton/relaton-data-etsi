- language: en
  script: Latn
  content: "The present document defines the set of specification documents applicable
    to IP Datacast services over DVB-H. The set of documents describes the IP Datacast
    over DVB-H air interface:\r\n·DVB-H Radio Interface\r\n·IP Datacast over DVB-H
    Service Layer\r\n·IP Datacast Content Formats\r\nThe set of specifications also
    include the definition of the IP Datacast end-to-end system and use cases for
    phase 1.\r\n"

abstract:
- content: "ES 203 199 provides detailed guidance on detailed Life Cycle Assessment
    (LCA) of ICT goods, networks, and services. However, there is sometimes a need
    to perform simplified LCA studies e.g. for screening purpose and not for product
    certification. Hence this standard will provide guidance (and methods) on how
    to perform, use and report simplified LCA.\r\nThis standard will be technically
    aligned with ITU-T L.simplifiedLCA."

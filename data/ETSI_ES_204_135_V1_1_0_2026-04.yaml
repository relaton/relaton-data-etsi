abstract:
- content: "This standard provides guidelines for assessing the greenhouse gas (GHG)
    emissions from Artificial Intelligence (AI) systems objectively and transparently.
    The scope includes:\r\n–\tOverview of the impacts of AI on GHG emissions;\r\n–\tSolutions
    and framework for evaluating the impact of AI on GHG emissions\r\nThe guidelines
    in this standard will be based on the life cycle assessment (LCA) methodology
    standardized in ES 203 199 and method for enabling effects for other sectors standardized
    in ITU-T L.1480.\r\n"

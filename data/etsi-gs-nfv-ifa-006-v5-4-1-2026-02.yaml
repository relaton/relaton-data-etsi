abstract:
- language: en
  script: Latn
  content: "This revision of NFV-IFA 006 continues the development of the specification
    as part of the NFV Release 5. This edition will consider updates related to time
    synchronization according to the recommendations in ETSI GR NFV-IFA046. The scope
    of the former edition is summarized hereafter: \r\n\r\nNFV-IFA 006 specifies the
    interfaces supported over the Vi-Vnfm reference point of the Network Functions
    Virtualisation Management and Orchestration (NFV-MANO) architectural framework
    ETSI GS NFV 006 as well as the information elements exchanged over those interfaces."

abstract:
- language: en
  script: Latn
  content: "This WI identifies the design of appropriate parametric prediction models
    of the Backhaul traffic demand statistics as a key area of investigation towards
    the goal of promoting the employment of the novel planning approach for wireless
    Backhaul Networks as defined by WI 28. In this context, the availability of realistic
    measurements on live networks is crucial to enable the definition and the validation
    of successful traffic distribution prediction strategies.\r\n\r\nMeasurement campaigns
    goal is obtaining a database of CDFs of the input traffic demand experienced by
    a statistically relevant set of Backhaul links deployed in different environmental
    and technological conditions.\r\n\r\nThe obtained database is envisioned to provide
    Mobile Network Operators with a valuable source of information of the statistical
    properties of the traffic demand characterizing specific Backhaul scenarios."

abstract:
- content: "A Framework (Guide) to Implementing Autonomic/Autonomous IPv6 based 5G
    Networks, by leveraging the ETSI GANA Multi-Layer AI / Multi-Layer Autonomic Management
    and Control Model and IPv6 Capabilities & Extensions that enable to Build Autonomic
    Networks.  The Framework prescribes how to introduce software components called
    Autonomic Functions (ETSI GANA Decision-making-Elements (DEs)), e.g. Autonomic-QoS-Management-DE,
    Autonomic-Security-Management-DE, etc., in the 5G Architecture and its associated
    Management and Control Architecture. The DEs and their associated Algorithms (including
    analytics, optimization and AI algorithms) are meant to drive control-loops within
    Network Functions of the 5G network infrastructure and/or drive control-loops
    at the higher level of abstraction for self-management functionality that is positioned
    within the outer Management and Control realm of a 5G Network Infrastructure—within
    a platform called the GANA Knowledge Plane (KP) Platform. The Framework also serves
    to: \r\n•\tPrescribe how to leverage certain IPv6 Capabilities in enabling Autonomic
    Functions (DEs) of the Autonomic 5G network to auto-discover each other, auto-discover
    various context information, monitoring data, and to exchange DE-to-DE control
    messages among each other for their collaborative operations in the Self-Driving/Self-Management
    Operations of the 5G network(s); \r\n•\tProvide Guidance to Innovators of DEs
    and their associated Autonomics Algorithms, on the types of GANA DEs that should
    be designed to auto-configure and dynamically (autonomically) orchestrate and
    (re)-configure various IPv6 Protocols of the of 5G Network as driven by Service
    or Slice provisioning, or adaptively to meet certain objectives.  "

abstract:
- language: en
  script: Latn
  content: "With this proposed work item, TC INT aims at delivering specifications
    enabling conformance testing for IP/ICMP Translation Algorithm; (RFC7915). This
    work-item will deliver part 1 of a three-part specification, focusing on Protocol
    Implementation Conformance Statements (PICS).\r\nThe main aspects to be tested
    are:\r\n\tTranslating IP/ICMP hearders and messages from IPv4 to IPv6;\r\n\tTranslating
    IP/ICMP hearders and messages from IPv6 to IPv4;\r\n"

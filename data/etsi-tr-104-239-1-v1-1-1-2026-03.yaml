abstract:
- language: en
  script: Latn
  content: This work item is the first part in a series of quantum-safe implementation
    guidance documents. It is intended to provide developers with general guidance
    to aid the secure implementation of quantum-safe algorithms.  This will include
    an overview of the interfaces and expected security properties of quantum-safe
    algorithms; some general good practice guidance for cryptographic implementations;
    some background on side-channel and fault attacks; and a brief discussion of testing
    and formal verification.

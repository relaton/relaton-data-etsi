abstract:
- content: " This TR provides an overview and analysis of interfaces enabling interaction
    between the European Digital Identity Wallet and trust service providers, including
    electronic signing.\r\nMore specifically, this WI:\r\nDescribes the functional
    models and possible interfaces between Digital Identity Wallets and trust service
    providers (TSPs), both when TSPs act as issuers of certificates and attribute
    attestations and when they act as relying parties;\r\nOutlines architectural considerations
    and interface components supporting the creation of electronic signatures where
    a trust service provider manages the signature creation device;\r\nPresents possible
    use cases for the application of the Wallet in various trust service contexts,
    including electronic signature, seal, certificate issuance, and attribute attestation;\r\nExplores
    the relationship between Wallet interactions and relevant European and international
    standards (including ETSI TS 119 471, ETSI TS 119 472-1/2/3, ISO/IEC 23220, and
    OpenID protocols)."

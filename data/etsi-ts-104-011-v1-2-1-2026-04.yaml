abstract:
- language: en
  script: Latn
  content: "Specification of a spectrum sharing framework suitable for the needs of
    local private networks for dynamic and temporary use cases, derived from existing
    frameworks such as eLSA, AFC, CBRS.\r\nIn version 1.2.1, further considerations
    of spectrum sharing scenarios are added, including but not limited to\r\n- a procedure
    for the handover between DSASs\r\n- the sharing of information (e.g. on NPU interference)
    among DSASs with the objective of aggregate interference calculation\r\n- requirements
    for scenarios with one or multiple DSASs per zone."

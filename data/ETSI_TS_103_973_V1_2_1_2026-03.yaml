abstract:
- content: "Revision of ETSI TS 103 973 to: \r\n- Define a CMMF bitstream profile
    specifying a CMMF bitstream construction using a minimum set of capabilities and
    functionalities required for delivering content (e.g., CMAF segments) using CMMF,
    and a schema for configuring the CMMF encoder for constructing corresponding CMMF
    bitstreams.\r\n- Define a content delivery protocol to support delivery of resources
    (e.g., CMAF segments) over HTTP using CMMF, and a configuration document format
    as the media entry point."

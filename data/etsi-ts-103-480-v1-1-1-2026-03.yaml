abstract:
- language: en
  script: Latn
  content: The purpose of this work is to describe the test cases and scenarios for
    interoperability testing of the architecture and core elements for independent
    access networks. Scenarios cover for instance location based and policy based
    emergency call routing, network or handset derived caller location (e.g. AML)
    as well as legacy, IP, enterprise/campus, and IMS based access networks. The tested
    architecture is currently named Next Generation 112 architecture.

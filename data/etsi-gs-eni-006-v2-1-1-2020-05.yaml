abstract:
- language: en
  script: Latn
  content: "This Work Item specifies a framework for use within ETSI ENI ISG to coordinate
    and promote public demonstrations of Proof of Concept (PoC) validating key technical
    components developed in ENI.\r\n\r\nThe objective for the PoCs is to build commercial
    awareness and confidence and encourage development of an open ecosystem by integrating
    components from different players. \r\n\r\nThis framework outlines:\r\n•rationale
    for ENI ISG PoCs;\r\n•ENI ISG PoC process;\r\n•submission, format and criteria
    for ENI ISG PoC Proposals;\r\n•review and acceptance criteria of PoC Proposals;\r\n•ENI
    ISG PoC Report format and issues;\r\n•ETSI support for PoC team.\r\n\r\nThe present
    publication is revised to include; e.g.:\r\n•the ENI System Architecture,\r\n•the
    ENI new issues and Use Cases,\r\n•the ENI measurability criteria."

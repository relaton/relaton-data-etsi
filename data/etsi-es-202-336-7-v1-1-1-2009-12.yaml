abstract:
- language: en
  script: Latn
  content: The present document applies to monitoring of power and cooling systems
    for telecommunication installations and equipment. This part 7 is the data description
    of other utilities system including input/output from building access control,
    fire detection and every general purpose related to the telecom/datacom environment.
    It provides the information tables, the DTD description and XML files. This description
    is based on generic recommendation of part 1 core document.

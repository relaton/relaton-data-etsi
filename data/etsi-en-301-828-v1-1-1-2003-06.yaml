abstract:
- language: en
  script: Latn
  content: "Authentication of a WTM user (SS-WTAT)  is a supplementary service that
    enables a PISN, as a security measure, to validate the identity provided by the
    WTM user.\r\nAuthentication of the PISN (SS-WTAN) is a supplementary service that
    enables a served WTM user, as a security measure, to validate the identity of
    the PISN."

abstract:
- language: en
  script: Latn
  content: This EN will cover non-contact based UWB devices for security screening
    applications. Therefore, this EN will cover SSC devices working within the frequency
    range 60 – 82GHz. It includes a detailed description of the wanted performance
    requirement, RX-requirements and fixed limits for all requirements based on a
    clear test procedure. Equipment covered by the present document operates in accordance
    ETSI TR 103 664 V1.1.1. and results out of ECC SE24 WI74.

abstract:
- language: en
  script: Latn
  content: "Ammend TS 119 472-2 v1.1.1 based on comments arrived from the EC \r\n\r\n1)
    Update references to HAIP to its latest version\r\n2) Align requirements on cryptographic
    algorithms to the requirements in ISO 18013-5 in clause 5.2 \r\n3) Clause 5.3.\r\n\ta)
    Drop some requirements that are either repetitions of requirements already stated
    in ISO 18013-5.\r\n\tb) Drop some requirements that are out of the scope of the
    TS as they affect to Issuers of Access Certificates.\r\n4) Clause 5.4:\r\n\ta)Both
    deviceSigned and issuerSigned should be able to carry attributes for satisfying
    needs of well identified use cases.\r\n\tb) Allow responses that are secured using
    digital signatures or MAC.\r\n\tc) Drop some requirements that are duplicates
    of requirements stated in ISO 18013-5\r\n\r\n5) Clause 6.3.1.3. Remove requirements
    that are duplicates of requirements stated in HAIP.\r\n\r\n6) Clause 6.3.1.4:
    for covering the cases where the RP does not have registration certificate, the
    RO has to contain verifier_info with registration information. Clause 6.3.1.4
    has to include requirements for allowing the incorporation of this information
    in the RO.\r\n\r\n7) The TS must also provide profiles for HAIP clause 5.2  and
    ISO 18013-7 Annex C (which version 1.1.1 does not include)\r\n\r\n8) resolve additional
    comments raised by TC members"

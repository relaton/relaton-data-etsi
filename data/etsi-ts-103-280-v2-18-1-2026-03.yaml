- language: en
  script: Latn
  content: "The present document defines a dictionary of parameters that are commonly
    used in multiple TC LI specifications. Aside from defining a dictionary, the present
    document aims to provide technical means for other specifications to use. It is
    encouraged to use the present document in the development of new specifications.\r\nThis
    revision is to provide the following: IPv4 regex corrections; Extended WGS84 Coordinate
    Types."

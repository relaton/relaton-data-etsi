abstract:
- content: This new work item will analyze Model-as-a-Service (MaaS) for AI-based
    applications and identify relevant use cases in NFV, with a focus on the definition
    and role of MaaS within the NFV context. It will also investigate how MaaS can
    be introduced to the NFV framework (including the relevant functional entities,
    architecture options, functions, security aspects, information models, and interfaces,
    etc.),and how MaaS can assist the management of telecom clouds. Based on research
    outputs, it will provide corresponding recommendations and also determine the
    specification approach of the interfaces and information modeling in relation
    to other ETSI NFV specifications.

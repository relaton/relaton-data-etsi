abstract:
- language: en
  script: Latn
  content: To detail the reported TETRA air interface vulnerabilities, describe in
    depth their importance and difficulty of enabling in operational environments.
    To describe the changes introduced to the TETRA security standard  TS 100 392-7
    V4.1.1 and the reasoning behind the updates including mitigations and general
    specification maintenance. The reduced costs of computing capability and the potential
    threat of quantum computing which motivated the development of additional security
    algorithms are detailed.

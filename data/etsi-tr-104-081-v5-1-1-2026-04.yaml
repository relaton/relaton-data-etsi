abstract:
- language: en
  script: Latn
  content: "The “Guide for the Migration to TTCN-3 V5” is intended to prepare the\r\nimplementation
    of the major release TTCN-3 V5. The migration guide\r\nidentifies all features
    to be included in the new major release,\r\nidentifies possible backwards-incompatible
    feature changes, and provides\r\nguidelines for migrating from the existing TTCN-3
    V4.x to the new TTCN-3\r\nV5.0 for users and tool providers."

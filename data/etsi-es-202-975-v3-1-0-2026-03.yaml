abstract:
- language: en
  script: Latn
  content: "The document(s) will specify functional, service and accessibility requirements
    for Relay services provided over ICT networks (including the Internet). The document(s)
    will be applicable to all kinds of relay services enabling a user with functional
    limitations (related to hearing, speech or cognitive functions, or combinations
    thereof), to communicate with other users via an interpreter. The document will
    appliy to text relay services, speech-to-speech relay services, video relay services,
    and captioned telephony services provided over telephony networks or the Internet
    (in compliance with the requirements in the Web Accessibility Directive, WAD and
    the European Accessibility Act, EAA [Ref]). Requirements will be specified for
    multi-lingual services, services provided on a 365/24/7 basis, as well as for
    limited-hour services. The document(s) will be intended to be used stand-alone,
    but may also provide information elements suitable for incorporation into contracts
    between commissioning authorities or agents and Relay service providers.\r\n"

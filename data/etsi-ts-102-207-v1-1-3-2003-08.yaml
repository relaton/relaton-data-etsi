  script: Latn
  content: "Based on general architecture defined by DTR/M-COMM-003, this task will
    have to address:\r\n- General model for roaming, taking into account work on number
    portability in other bodies.\r\n- Definition of related data to be shared between
    different parties\r\nProtocol between Sig Gwy for redirection of the signature
    messages from the visited Sig Gwy to the home Sig Gwy."

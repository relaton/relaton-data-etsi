  script: Latn
  content: This Work Item will specify the technology requirements for F5G-A use cases
    release 4 and will explore existing technologies from related SDOs. This Work
    Item will perform gap analyses between the technologies required by the use case
    and those that are available. The identification of the relevant SDOs will be
    based on their exisiting projects, Work Items and competence for each matter,
    thereby avoiding duplication of work and conflicts.

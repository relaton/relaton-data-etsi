abstract:
- language: en
  script: Latn
  content: The fifth Release of the EN will cover all UTRA FDD and E-UTRA FDD features
    up to and including 3GPP Release 9. In addition it covers requirements specified
    in ETSI TS 102 735 v.7.1.0. This Part will cover the essential requirements of
    article 3.2 of the R&TTE Directive for UTRA FDD Repeater in addition to those
    common ones of Part1.

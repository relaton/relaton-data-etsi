abstract:
- language: en
  script: Latn
  content: "This revision of NFV-IFA 007 conducts NFV Release 3 maintenance. It corrects
    errors, ambiguities, misalignments, and applies editorial modifications (i.e.
    Corrections of category F and D as described in ETSI TWPs Annex L). This edition
    does not add or modify features, nor does it extend the scope of the former Release
    3 edition summarized hereafter:\r\n\r\nNFV-IFA 007 specifies the interfaces supported
    over the Or-Vnfm reference point of the Network Functions Virtualisation Management
    and Orchestration (NFV-MANO) architectural framework ETSI GS NFV-MAN 001 as well
    as the information elements exchanged over those interfaces."

abstract:
- content: "This present document will aim to provide guidance and information about
    social media networks and messaging applications with their many issues regarding
    user safety, privacy, and content. When tackling these issues, there is a tendency
    \ to think of a single service or application. This proposed work will aim to
    move to a holistic approach. This is the same way in cybersecurity when helping
    companies understand their attack surface from their systems and devices to the
    suppliers and vendors they rely on.   \r\n\r\n"
